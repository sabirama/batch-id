<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Canvas</title>
    <style>
        body {
            height: 400px;
            width: 800px;
            margin: auto;
            padding: 1rem;
        }

        #signatureCanvas {
            border: 1px solid #000;
            margin: 1rem;
        }

        #controls {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <label for="penSize">Pen Size:</label>
    <input type="range" id="penSize" min="1" max="50" value="5">
    <label for="filename">Save as:</label>
    <input type="text" id="filename" value="signature" onchange="changeFileName(event)">
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveCanvas()">Save</button>
    <button onclick="toggleEraser(event)">Toggle Eraser</button>
    <canvas id="signatureCanvas"></canvas>

    <script src="test.js"></script>
</body>

</html>
